<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilo Beauty Salon</title>
    <!-- Preconnect to improve font loading performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap"
        rel="stylesheet">
    <!-- Impact font fallback - using system fonts as backup -->
    <link href="https://fonts.cdnfonts.com/css/impact" rel="stylesheet" onerror="this.onerror=null;">
    <!-- Fallback styles for Impact font -->
    <style>
        @font-face {
            font-family: 'Impact Fallback';
            src: local('Impact'), local('Haettenschweiler'), local('Arial Black');
            font-weight: normal;
            font-style: normal;
        }
        .font-impact {
            font-family: 'Impact', 'Impact Fallback', 'Haettenschweiler', 'Arial Black', sans-serif !important;
        }
    </style>
</head>
