# Netlify Configuration File
# This file configures how Netlify builds and deploys your site

[build]
  # Command to build your site
  command = "npm run build"
  
  # Directory that contains the built site
  publish = "dist"
  
  # Node.js version to use during build
  environment = { NODE_VERSION = "20" }

# Redirect all requests to index.html for SPA routing
# This prevents 404 errors when users refresh or navigate to client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
