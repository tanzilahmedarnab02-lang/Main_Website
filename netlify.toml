# Netlify Configuration File
# This file configures how Netlify builds and deploys your site

[build]
  # Command to build your site (standard Vite command)
  command = "npm run build"
  
  # Directory that contains the built site (Vite default is 'dist')
  publish = "dist"
  
  # Node.js version to use during build
  # environment = { NODE_VERSION = "20", SECRETS_SCAN_OMIT_PATHS = "dist/**,supabase_schema.sql", SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY" }

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_PATHS = "dist, dist/**, supabase_schema.sql"
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_GEMINI_API_KEY"

# Redirect all requests to index.html for SPA routing
# This prevents 404 errors when users refresh or navigate to client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache static assets (Vite puts them in assets/ folder)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache other JS/CSS files that might be at the root
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
